openapi: 3.0.0
info:
  title: DisplayDeck API
  version: 1.0.0
  description: Digital menu management system API
  contact:
    name: DisplayDeck API Support
    url: https://displaydeck.com/support

servers:
  - url: https://api.displaydeck.com/v1
    description: Production server
  - url: https://staging-api.displaydeck.com/v1
    description: Staging server

security:
  - JWTAuth: []

paths:
  # Authentication Endpoints
  /auth/login:
    post:
      tags: [Authentication]
      summary: User login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
      responses:
        200:
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  refresh_token:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
                  businesses:
                    type: array
                    items:
                      $ref: '#/components/schemas/BusinessAccount'
        401:
          description: Invalid credentials

  /auth/refresh:
    post:
      tags: [Authentication]
      summary: Refresh JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        200:
          description: Token refreshed
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  refresh_token:
                    type: string
        401:
          description: Invalid refresh token

  # Business Management
  /businesses:
    get:
      tags: [Businesses]
      summary: List user's businesses
      responses:
        200:
          description: List of businesses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BusinessAccount'

    post:
      tags: [Businesses]
      summary: Create new business account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, subscription_tier]
              properties:
                name:
                  type: string
                  maxLength: 255
                subscription_tier:
                  type: string
                  enum: [basic, professional, enterprise]
                timezone:
                  type: string
                  default: "UTC"
      responses:
        201:
          description: Business created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessAccount'

  /businesses/{business_id}/users:
    get:
      tags: [Business Users]
      summary: List business users
      parameters:
        - name: business_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        200:
          description: List of business users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BusinessUser'

    post:
      tags: [Business Users]
      summary: Invite user to business
      parameters:
        - name: business_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, role]
              properties:
                email:
                  type: string
                  format: email
                role:
                  type: string
                  enum: [owner, manager, staff, readonly]
      responses:
        201:
          description: User invited

  # Menu Management
  /businesses/{business_id}/menus:
    get:
      tags: [Menus]
      summary: List business menus
      parameters:
        - name: business_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: is_published
          in: query
          schema:
            type: boolean
      responses:
        200:
          description: List of menus
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Menu'

    post:
      tags: [Menus]
      summary: Create new menu
      parameters:
        - name: business_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  maxLength: 255
                description:
                  type: string
                layout_template:
                  type: string
                  default: "grid"
      responses:
        201:
          description: Menu created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Menu'

  /menus/{menu_id}:
    get:
      tags: [Menus]
      summary: Get menu details
      parameters:
        - name: menu_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        200:
          description: Menu details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuDetail'

    put:
      tags: [Menus]
      summary: Update menu
      parameters:
        - name: menu_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MenuUpdate'
      responses:
        200:
          description: Menu updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Menu'

  /menus/{menu_id}/items/{item_id}/price:
    patch:
      tags: [Menu Items]
      summary: Update item price (real-time API)
      parameters:
        - name: menu_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: item_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [price]
              properties:
                price:
                  type: number
                  format: decimal
                  minimum: 0
      responses:
        200:
          description: Price updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuItem'

  # Display Management
  /businesses/{business_id}/displays:
    get:
      tags: [Displays]
      summary: List business displays
      parameters:
        - name: business_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [online, offline, error, updating]
      responses:
        200:
          description: List of displays
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DisplayDevice'

  /displays/pair:
    post:
      tags: [Displays]
      summary: Pair display via QR code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pairing_code, business_id]
              properties:
                pairing_code:
                  type: string
                  maxLength: 32
                business_id:
                  type: string
                  format: uuid
                display_name:
                  type: string
                  maxLength: 255
      responses:
        200:
          description: Display paired successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisplayDevice'
        400:
          description: Invalid or expired pairing code

  /displays/{display_id}/menu:
    put:
      tags: [Displays]
      summary: Assign menu to display
      parameters:
        - name: display_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [menu_id]
              properties:
                menu_id:
                  type: string
                  format: uuid
      responses:
        200:
          description: Menu assigned to display

  /displays/{display_id}/status:
    get:
      tags: [Displays]
      summary: Get display health status
      parameters:
        - name: display_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        200:
          description: Display status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [online, offline, error, updating]
                  last_heartbeat:
                    type: string
                    format: date-time
                  last_sync:
                    type: string
                    format: date-time
                  network_info:
                    type: object
                  performance_stats:
                    type: object

  # Media Management
  /media/upload:
    post:
      tags: [Media]
      summary: Upload media file
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, business_id]
              properties:
                file:
                  type: string
                  format: binary
                business_id:
                  type: string
                  format: uuid
                alt_text:
                  type: string
                  maxLength: 255
      responses:
        201:
          description: File uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaAsset'
        413:
          description: File too large

components:
  securitySchemes:
    JWTAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        first_name:
          type: string
        last_name:
          type: string
        is_email_verified:
          type: boolean

    BusinessAccount:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        subscription_tier:
          type: string
          enum: [basic, professional, enterprise]
        subscription_status:
          type: string
          enum: [active, suspended, cancelled]
        max_displays:
          type: integer
        max_users:
          type: integer
        logo_url:
          type: string
          format: uri
        primary_color:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
        timezone:
          type: string

    BusinessUser:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        role:
          type: string
          enum: [owner, manager, staff, readonly]
        is_active:
          type: boolean
        accepted_at:
          type: string
          format: date-time

    Menu:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        version:
          type: integer
        is_active:
          type: boolean
        is_published:
          type: boolean
        layout_template:
          type: string
        background_color:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    MenuDetail:
      allOf:
        - $ref: '#/components/schemas/Menu'
        - type: object
          properties:
            categories:
              type: array
              items:
                $ref: '#/components/schemas/MenuCategory'

    MenuCategory:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        image:
          $ref: '#/components/schemas/MediaAsset'
        sort_order:
          type: integer
        is_visible:
          type: boolean
        items:
          type: array
          items:
            $ref: '#/components/schemas/MenuItem'

    MenuItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        price:
          type: number
          format: decimal
        image:
          $ref: '#/components/schemas/MediaAsset'
        is_available:
          type: boolean
        is_featured:
          type: boolean
        allergens:
          type: array
          items:
            type: string
        dietary_flags:
          type: array
          items:
            type: string

    MenuUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        layout_template:
          type: string
        background_color:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
        text_color:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
        scheduled_publish_at:
          type: string
          format: date-time

    DisplayDevice:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        location:
          type: string
        status:
          type: string
          enum: [online, offline, error, updating]
        is_paired:
          type: boolean
        last_heartbeat:
          type: string
          format: date-time
        screen_resolution:
          type: string
        orientation:
          type: string
          enum: [landscape, portrait]
        created_at:
          type: string
          format: date-time

    MediaAsset:
      type: object
      properties:
        id:
          type: string
          format: uuid
        original_filename:
          type: string
        file_type:
          type: string
          enum: [image, video]
        file_size:
          type: integer
        width:
          type: integer
        height:
          type: integer
        file_url:
          type: string
          format: uri
        thumbnail_url:
          type: string
          format: uri
        display_url:
          type: string
          format: uri
        alt_text:
          type: string
        upload_status:
          type: string
          enum: [pending, processing, ready, error]

  responses:
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Authentication credentials were not provided"

    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "You do not have permission to perform this action"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Resource not found"

    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
              details:
                type: object