version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: displaydeck_dev_db
    environment:
      POSTGRES_DB: displaydeck
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - displaydeck_dev_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: displaydeck_dev_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    networks:
      - displaydeck_dev_network
    command: redis-server --appendonly yes

  # Django Backend Development Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: displaydeck_dev_backend
    environment:
      - DEBUG=True
      - SECRET_KEY=dev-secret-key-not-for-production
      - DB_NAME=displaydeck
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend
    ports:
      - "8000:8000"
      - "8001:8001"  # For WebSocket development
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
    networks:
      - displaydeck_dev_network
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  # React Frontend Development Server
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: displaydeck_dev_frontend
    environment:
      - REACT_APP_API_URL=http://localhost:8000/api
      - REACT_APP_WS_URL=ws://localhost:8001/ws
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - displaydeck_dev_network
    command: npm start

volumes:
  postgres_dev_data:
  redis_dev_data:

networks:
  displaydeck_dev_network:
    driver: bridge