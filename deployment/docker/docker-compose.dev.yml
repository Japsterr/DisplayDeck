version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: displaydeck_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: displaydeck_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache and Channel Layer
  redis:
    image: redis:7-alpine
    container_name: displaydeck_redis_dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Django Backend
  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile.dev
    container_name: displaydeck_backend_dev
    restart: unless-stopped
    environment:
      - DEBUG=True
      - DB_HOST=postgres
      - DB_NAME=displaydeck_dev
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=dev-secret-key-change-in-production
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0,backend
    ports:
      - "8000:8000"
    volumes:
      - ../../backend/src:/app
      - backend_media_dev:/app/media
      - backend_static_dev:/app/staticfiles
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        python manage.py migrate &&
        python manage.py collectstatic --noinput &&
        python manage.py runserver 0.0.0.0:8000
      "

  # React Frontend
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile.dev
    container_name: displaydeck_frontend_dev
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - REACT_APP_API_URL=http://localhost:8000/api/v1
      - REACT_APP_WS_URL=ws://localhost:8000/ws
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "3000:3000"
    volumes:
      - ../../frontend/src:/app/src
      - ../../frontend/public:/app/public
      - ../../frontend/package.json:/app/package.json
      - /app/node_modules
    depends_on:
      - backend

  # Mobile Development Server (Expo)
  mobile:
    build:
      context: ../../mobile
      dockerfile: Dockerfile.dev
    container_name: displaydeck_mobile_dev
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - EXPO_API_URL=http://localhost:8000/api/v1
      - EXPO_WS_URL=ws://localhost:8000/ws
    ports:
      - "19000:19000"  # Expo Metro bundler
      - "19001:19001"  # Expo DevTools
      - "19002:19002"  # Expo web
      - "19006:19006"  # Expo webpack dev server
    volumes:
      - ../../mobile:/app
      - /app/node_modules
    depends_on:
      - backend

  # Nginx Development Proxy
  nginx:
    image: nginx:alpine
    container_name: displaydeck_nginx_dev
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/dev.conf:/etc/nginx/conf.d/default.conf
      - backend_static_dev:/var/www/static
      - backend_media_dev:/var/www/media
    depends_on:
      - backend
      - frontend

  # Development Database Admin (pgAdmin)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: displaydeck_pgadmin_dev
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@displaydeck.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data_dev:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

  # Redis Commander (Redis GUI)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: displaydeck_redis_commander_dev
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy

  # Mailhog (Email testing)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: displaydeck_mailhog_dev
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    environment:
      - MH_STORAGE=maildir
      - MH_MAILDIR_PATH=/maildir
    volumes:
      - mailhog_data_dev:/maildir

volumes:
  postgres_data_dev:
    driver: local
  redis_data_dev:
    driver: local
  backend_media_dev:
    driver: local
  backend_static_dev:
    driver: local
  pgadmin_data_dev:
    driver: local
  mailhog_data_dev:
    driver: local

networks:
  default:
    name: displaydeck_dev_network
    driver: bridge